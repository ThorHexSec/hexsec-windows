# HexSec Windows — developer-platform profile
# Windows 11 Pro workstation: development + light SRE + Steam/RetroArch.
# Docker Desktop is Windows-only (Hyper-V). WSL is not part of this profile.

name: developer-platform
version: "1.1.1"
description: >
  Windows 11 Pro developer workstation. Modular modules or full install.
  Docker Desktop runs without WSL (Windows / Hyper-V backend).
  Shell: PowerShell 7 + Oh My Posh + Windows Terminal Night City.

core_modules:
  - privacy
  - base
  - vcredist
  - shell
  - fonts
  - browsers
  - languages
  - databases
  - ides
  - containers
  - cloud-iac
  - cyber
  - productivity
  - media
  - virt
  - gaming
  - dotfiles

optional_modules:
  - cloud-gcp
  - iac-terraform

notes:
  - Prefer winget; use pip:* only when winget has no suitable package.
  - pip:* installs unelevated (uv tool / pip --user) even when the installer is elevated.
  - Docker Desktop requires Hyper-V / virtualization — WSL is not used.
  - Dotfiles: PowerShell 7 + Oh My Posh + Windows Terminal Night City (configs/dotfiles/).
  - Claude Code and Codex install unelevated (--scope user) with official fallbacks.
  - Version: 1.1.1 (Semantic Versioning).
